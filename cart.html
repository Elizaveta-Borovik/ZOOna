<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/logo.jpg" type="image/x-icon">
    <title>ZOOna. Корзина</title>
</head>

<body>
    <div class="header">
        <div class="header__container">
            <span class="header__logo">
                <img src="img/logo.jpg" alt="ZOOna-товары для животных">
            </span>
            
            <button class="burger-menu" id="burgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <div class="header__home desktop-only">
                <a href="index.html">
                    <img src="img/home.png" alt="Главная">
                </a>
            </div>
            
            <div class="header__search desktop-only">
                <input type="text" 
                    id="searchInputDesktop" 
                    placeholder="Я ищу..."
                    autocomplete="off"
                    readonly>
            </div>
            
            <div class="search-overlay" id="searchOverlay">
                <div class="search-container">
                    <form class="search-form" id="searchForm">
                        <input type="text" 
                            id="searchInputMain" 
                            placeholder="Введите название товара..."
                            autocomplete="off">
                        <button type="button" class="search-close" id="searchCloseBtn">
                            ✕
                        </button>
                    </form>
                    <div class="search-results" id="searchResults"></div>
                </div>
            </div>
            
            <div class="header__user-container promotion desktop-only">
                <a href="promotion.html">
                    <img src="img/sales.png" alt="акции">
                    <span>Акции</span>
                </a>
            </div>
            
            <div class="header__account desktop-only">
                <a href="account.html">
                    <img src="img/account.png" alt="Личный кабинет">
                    <span>Личный кабинет</span>
                </a>
            </div>
            
            <div class="header__user-container cart desktop-only">
                <a href="cart.html">
                    <img src="img/cart.png" alt="корзина">
                    <span>Корзина <span class="cart-count">0</span></span>
                </a>
            </div>
        </div>

        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu__content">
                <div class="mobile-search">
                    <input type="text" placeholder="Поиск товаров...">
                    <button>
                        <img src="img/search.png" alt="поиск">
                    </button>
                </div>

                <div class="mobile-user-links">
                    <a href="index.html" class="mobile-user-link">
                        <img src="img/home.png" alt="Главная">
                        <span>Главная</span>
                    </a>

                    <a href="promotion.html" class="mobile-user-link">
                        <img src="img/sales.png" alt="акции">
                        <span>Акции</span>
                    </a>

                    <a href="account.html" class="mobile-user-link">
                        <img src="img/account.png" alt="Личный кабинет">
                        <span>Личный кабинет</span>
                    </a>

                    <a href="cart.html" class="mobile-user-link">
                        <img src="img/cart.png" alt="корзина">
                        <span>Корзина <span class="cart-count">0</span></span>
                    </a>
                </div>

                <div class="mobile-categories">
                    <a href="dog.html" class="mobile-category">
                        <img src="img/icon-dog.jpg" alt="собаки">
                        <span>Собаки</span>
                    </a>

                    <a href="cat.html" class="mobile-category">
                        <img src="img/icon-cat.jpg" alt="кошки">
                        <span>Кошки</span>
                    </a>

                    <a href="bird.html" class="mobile-category">
                        <img src="img/icon-bird.jpg" alt="птицы">
                        <span>Птицы</span>
                    </a>

                    <a href="rodent.html" class="mobile-category">
                        <img src="img/icon-rodent.jpg" alt="грызуны">
                        <span>Грызуны</span>
                    </a>

                    <a href="fish.html" class="mobile-category">
                        <img src="img/icon-fish.jpg" alt="рыбки">
                        <span>Рыбки</span>
                    </a>

                    <a href="pharmacy.html" class="mobile-category">
                        <img src="img/icon-pharmacy.jpg" alt="ветаптека">
                        <span>Ветаптека</span>
                    </a>
                </div>
                <div class="mobile-contacts">
                    <div class="mobile-phone">7788</div>
                    <div class="mobile-contact">МТС: +375 (33) 333-33-33</div>
                    <div class="mobile-email">zoona@mail.ru</div>
                </div>
            </div>
        </div>
        <div class="menu-overlay" id="menuOverlay"></div>
    </div>

    <div class="menu__container desktop-only">
        <div class="menu__dog">
            <a href="dog.html">
                <img src="img/icon-dog.jpg" alt="собаки">
                <span>Собаки</span>
            </a>
        </div>

        <div class="menu__cat">
            <a href="cat.html">
                <img src="img/icon-cat.jpg" alt="кошки">
                <span>Кошки</span>
            </a>
        </div>

        <div class="menu__bird">
            <a href="bird.html">
                <img src="img/icon-bird.jpg" alt="птицы">
                <span>Птицы</span>
            </a>
        </div>

        <div class="menu__rodent">
            <a href="rodent.html">
                <img src="img/icon-rodent.jpg" alt="грызуны">
                <span>Грызуны</span>
            </a>
        </div>

        <div class="menu__fish">
            <a href="fish.html">
                <img src="img/icon-fish.jpg" alt="рыбки">
                <span>Рыбки</span>
            </a>
        </div>

        <div class="menu__pharmacy">
            <a href="pharmacy.html">
                <img src="img/icon-pharmacy.jpg" alt="ветаптека">
                <span>Ветаптека</span>
            </a>
        </div>
    </div>
    
    <div class="cart__main">
        <img src="img/trolley-cart.png" alt="Корзина">
        <span>Нет товаров</span>
        <a href="index.html">Перейти в каталог</a>
    </div>


    <div class="cart-with-items" id="fullCart" style="display: none;">
        <h2>Ваша корзина</h2>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total">
            <span>Итого:</span>
            <span class="total-price" id="totalPrice">0 руб.</span>
        </div>
        <div class="cart-actions">
            <a href="index.html" class="continue-shopping">Продолжить покупки</a>
            <button class="checkout-btn">Оформить заказ</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
